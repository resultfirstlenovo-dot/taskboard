# Copy these values into Streamlit Cloud -> your app -> Settings -> Secrets
# (For local testing, save as .streamlit/secrets.toml — never commit real secrets to GitHub.)

[supabase]
url = "https://YOUR-PROJECT-REF.supabase.co"
key = "YOUR-ANON-PUBLIC-KEY"

[app]
admin_password = "choose-a-strong-password"   # only the coordinator knows this
viewer_password = "shared-team-password"      # share this with the 7 team members

# Microsoft Graph — used for instant "assigned"/"updated" emails sent from
# inside the app. Leave as placeholders until you have an Azure App
# Registration (see README.md); notifications stay silently disabled until
# real values are set. The daily reminder/overdue/summary emails use the
# SAME values but read them from GitHub Actions secrets, not this file
# (see .github/workflows/notifications.yml).
[graph]
tenant_id = "YOUR-AZURE-TENANT-ID"
client_id = "YOUR-APP-REGISTRATION-CLIENT-ID"
client_secret = "YOUR-APP-REGISTRATION-CLIENT-SECRET"
sender_email = "taskboard@yourorg.com"
