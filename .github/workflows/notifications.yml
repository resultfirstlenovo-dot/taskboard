name: TaskBoard notifications

on:
  schedule:
    # 03:00 UTC daily (~08:30 IST). Adjust to your team's morning.
    - cron: "0 3 * * *"
  workflow_dispatch: {}

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run due/overdue/summary checks
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          MS_GRAPH_TENANT_ID: ${{ secrets.MS_GRAPH_TENANT_ID }}
          MS_GRAPH_CLIENT_ID: ${{ secrets.MS_GRAPH_CLIENT_ID }}
          MS_GRAPH_CLIENT_SECRET: ${{ secrets.MS_GRAPH_CLIENT_SECRET }}
          MS_GRAPH_SENDER_EMAIL: ${{ secrets.MS_GRAPH_SENDER_EMAIL }}
        run: python scheduler/run_notifications.py
